<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Fingerprint Heart Animation</title>
  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: white;
    }
  </style>
</head>
<body>
<canvas id="canvas" width="700" height="500"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let progress = 0;
function heartShape(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y =
    13 * Math.cos(t) -
    5 * Math.cos(2 * t) -
    2 * Math.cos(3 * t) -
    Math.cos(4 * t);
  return {
    x: x * 15 + canvas.width / 2,
    y: -y * 15 + canvas.height / 2 + 40
  };
}
function drawFingerprint(cx, cy, scale, alpha, tilt) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  for (let i = 0; i < 34; i++) {
    ctx.beginPath();
    const rx = 8 + i * 4;
    const ry = 6 + i * 3.2;
    for (let a = 0; a < Math.PI * 2; a += 0.05) {
      const noise = Math.sin(a * 8 + i) * 2;
      const x = Math.cos(a) * (rx + noise);
      const y = Math.sin(a) * (ry + noise);
      if (a === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();
}
function drawHeartMask() {
  ctx.save();
  ctx.beginPath();
  for (let t = 0; t <= Math.PI * 2; t += 0.02) {
    const p = heartShape(t);
    if (t === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.clip();
  if (progress > 0) {
    drawFingerprint(275, 245, 1.6, Math.min(progress, 1), -0.45);
  }
  if (progress > 0.45) {
    drawFingerprint(425, 245, 1.6, Math.min((progress - 0.45) * 1.8, 1), 0.45);
  }
  ctx.restore();
}
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawHeartMask();
  progress += 0.01;
  if (progress > 1.15) progress = 1.15;
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
