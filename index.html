<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fingerprint Heart</title>
<style>
  body {
    margin: 0;
    background: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="canvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let frame = 0;
const firstPrint = [];
const secondPrint = [];

function heart(px, py) {
  const x = (px - 500) / 215;
  const y = -(py - 350) / 215;

  return Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y <= 0;
}

function createFingerprint(cx, cy, rotate, store) {
  for (let r = 10; r < 210; r += 6) {
    const line = [];

    for (let a = 0; a < Math.PI * 2; a += 0.025) {
      const rx = r * 0.62;
      const ry = r * 1.05;

      const wave = Math.sin(a * 11 + r * 0.13) * 3.5;

      let x = Math.cos(a) * (rx + wave);
      let y = Math.sin(a) * (ry + wave);

      const xr = x * Math.cos(rotate) - y * Math.sin(rotate);
      const yr = x * Math.sin(rotate) + y * Math.cos(rotate);

      const px = cx + xr;
      const py = cy + yr;

      if (heart(px, py)) {
        line.push({ x: px, y: py });
      }
    }

    if (line.length > 8) store.push(line);
  }
}

createFingerprint(430, 360, -0.72, firstPrint);
createFingerprint(570, 330, 0.62, secondPrint);

function drawLine(points, progress, alpha) {
  const max = Math.floor(points.length * progress);

  ctx.beginPath();
  let drawing = false;

  for (let i = 0; i < max; i++) {
    if (Math.random() < 0.018) {
      drawing = false;
      continue;
    }

    const p = points[i];

    if (!drawing) {
      ctx.moveTo(p.x, p.y);
      drawing = true;
    } else {
      ctx.lineTo(p.x, p.y);
    }
  }

  ctx.strokeStyle = `rgba(40,40,40,${alpha})`;
  ctx.stroke();
}

function drawFingerprint(lines, progress, alpha) {
  for (let i = 0; i < lines.length; i++) {
    const delay = i / lines.length;
    let p = (progress - delay * 0.5) * 2;
    p = Math.max(0, Math.min(1, p));

    if (p > 0) {
      drawLine(lines[i], p, alpha);
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.lineWidth = 2;
  ctx.lineCap = "round";

  const firstProgress = Math.min(frame / 120, 1);
  const secondProgress = Math.min(Math.max((frame - 120) / 120, 0), 1);

  drawFingerprint(firstPrint, firstProgress, 0.18);
  drawFingerprint(secondPrint, secondProgress, 0.65);

  frame++;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
