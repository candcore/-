<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fingerprint Heart</title>
<style>
  body {
    margin: 0;
    background: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="canvas" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let frame = 0;
const lines = [];

function heart(px, py) {
  let x = (px - 350) / 140;
  let y = -(py - 255) / 140;

  const v = Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y;
  return v <= 0;
}

function makePrint(cx, cy, rotate, side) {
  for (let r = 10; r < 125; r += 5) {
    const points = [];

    for (let a = 0; a < Math.PI * 2; a += 0.025) {
      let rx = r * 0.75;
      let ry = r * 1.05;

      let wave = Math.sin(a * 12 + r * 0.15) * 2.8;

      let x = Math.cos(a) * (rx + wave);
      let y = Math.sin(a) * (ry + wave);

      if (side === "left" && x > 60) continue;
      if (side === "right" && x < -60) continue;

      const xr = x * Math.cos(rotate) - y * Math.sin(rotate);
      const yr = x * Math.sin(rotate) + y * Math.cos(rotate);

      const px = cx + xr;
      const py = cy + yr;

      if (heart(px, py)) {
        points.push({ x: px, y: py });
      }
    }

    if (points.length > 5) {
      lines.push(points);
    }
  }
}

makePrint(290, 250, -0.55, "left");
makePrint(410, 250, 0.55, "right");

function drawBrokenLine(points, percent) {
  const max = Math.floor(points.length * percent);

  ctx.beginPath();
  let drawing = false;

  for (let i = 0; i < max; i++) {
    const p = points[i];

    if (Math.random() < 0.025) {
      drawing = false;
      continue;
    }

    if (!drawing) {
      ctx.moveTo(p.x, p.y);
      drawing = true;
    } else {
      ctx.lineTo(p.x, p.y);
    }
  }

  ctx.stroke();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.lineWidth = 1.6;
  ctx.strokeStyle = "rgba(10, 10, 10, 0.9)";
  ctx.lineCap = "round";

  const progress = Math.min(frame / 170, 1);

  for (let i = 0; i < lines.length; i++) {
    let delay = i / lines.length;
    let p = (progress - delay * 0.45) * 2.2;
    p = Math.max(0, Math.min(1, p));

    if (p > 0) {
      drawBrokenLine(lines[i], p);
    }
  }

  frame++;
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
