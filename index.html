<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fingerprint Heart</title>
<style>
  body {
    margin: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="c" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let frame = 0;
const lines = [];

function heart(x, y) {
  x = (x - 350) / 12;
  y = -(y - 260) / 12;

  const v = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;
  return v <= 0;
}

function makePrint(cx, cy, rotate, side) {
  for (let r = 8; r < 115; r += 5) {
    const points = [];

    for (let a = 0; a < Math.PI * 2; a += 0.035) {
      let rx = r * 0.82;
      let ry = r * 1.05;

      let wave = Math.sin(a * 9 + r * 0.2) * 2.5;
      let x = Math.cos(a) * (rx + wave);
      let y = Math.sin(a) * (ry + wave);

      if (side === "left" && x > 55) continue;
      if (side === "right" && x < -55) continue;

      const xr = x * Math.cos(rotate) - y * Math.sin(rotate);
      const yr = x * Math.sin(rotate) + y * Math.cos(rotate);

      const px = cx + xr;
      const py = cy + yr;

      if (heart(px, py)) {
        points.push({ x: px, y: py });
      }
    }

    if (points.length > 3) lines.push(points);
  }
}

makePrint(290, 245, -0.45, "left");
makePrint(410, 245, 0.45, "right");

function drawBrokenLine(points, percent) {
  ctx.beginPath();

  let started = false;
  const max = Math.floor(points.length * percent);

  for (let i = 0; i < max; i++) {
    if (Math.random() < 0.04) {
      started = false;
      continue;
    }

    const p = points[i];

    if (!started) {
      ctx.moveTo(p.x, p.y);
      started = true;
    } else {
      ctx.lineTo(p.x, p.y);
    }
  }

  ctx.stroke();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.lineWidth = 1.7;
  ctx.strokeStyle = "rgba(20,20,20,0.85)";
  ctx.lineCap = "round";

  const progress = Math.min(frame / 180, 1);

  for (let i = 0; i < lines.length; i++) {
    const appear = i / lines.length;
    const p = Math.min(Math.max((progress - appear * 0.6) * 2.2, 0), 1);

    if (p > 0) {
      drawBrokenLine(lines[i], p);
    }
  }

  frame++;
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
