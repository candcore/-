<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fade Image</title>

<style>
  body {
    margin: 0;
    background: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  img {
    width: 420px;
    opacity: 0;
    animation: fadeIn 3s ease forwards;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: scale(0.96);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }
</style>
</head>
<body>

<img src="https://raw.githubusercontent.com/candcore/-/refs/heads/main/Изображение%20HEIF.heic" alt="fingerprint heart">

</body>
</html>
